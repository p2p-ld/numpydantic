name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        platform: ["ubuntu-latest", "macos-latest", "windows-latest"]
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        exclude:
          # Don't test intermediate versions on non-linux OSes, to save test time.
          - platform: "macos-latest"
            python-version: "3.11"
          - platform: "macos-latest"
            python-version: "3.12"
          # mac struggles to build numcodecs with 3.14, from zarr<3
          - platform: "macos-latest"
            python-version: "3.14"
          - platform: "windows-latest"
            python-version: "3.11"
          - platform: "windows-latest"
            python-version: "3.12"
          - platform: "windows-latest"
            python-version: "3.13"

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v3

      - name: Set up python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[tests]"

      - name: Run Tests
        id: tests
        run: pytest

      - name: Coveralls Parallel
        uses: coverallsapp/github-action@v2
        if: runner.os != 'macOS'
        id: coveralls-parallel
        continue-on-error: true
        with:
          flag-name: run-${{ join(matrix.*, '-') }}
          parallel: true
          debug: true

      # job shouldn't fail if coveralls fails. it's very patchy lately.
      - name: Unfail coveralls
        if: job.steps.coveralls-parallel.status == failure() && job.steps.tests.status != failure()
        run: echo "OK"

  finish-coverage:
    needs: test
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: Coveralls Finished
        continue-on-error: true
        id: coveralls-finish
        uses: coverallsapp/github-action@v2
        with:
          parallel-finished: true
      - name: Unfail coveralls
        if: job.steps.coveralls-finish.status == failure()
        run: echo "OK"