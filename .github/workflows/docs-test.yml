name: Build and test documentation

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test_docs:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install pdm
          pdm install --with docs

      - name: Build docs
        run: pdm run docs-prod
