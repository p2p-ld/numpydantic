name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main


permissions:
  contents: read

jobs:
  ruff:
    name: Ruff Linting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: chartboost/ruff-action@v1

  black:
    name: Black Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: psf/black@stable

  lockfile:
    name: Lockfile Current
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
      - name: install pdm
        run: python -m pip install "pdm>=2.26.9"
      - name: check lockfile
        run: pdm lock --check --with :all